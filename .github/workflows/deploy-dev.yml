name: deploy-dev

on:
  workflow_dispatch:
    inputs:
      ref:
        description: 'branch/tag to deploy to dev'
        required: true
        default: 'develop'

concurrency:
  group: deploy-dev
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: dev
    steps:
      - name: SSH and deploy
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          port: ${{ secrets.SSH_PORT }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            set -e
            cd /home/raccoon/deploy/bunkr-dev
            git fetch --all --prune
            git reset --hard origin/${{ github.event.inputs.ref }}
            docker compose --env-file .env -f compose/docker-compose.yml up -d --build
            docker image prune -f
