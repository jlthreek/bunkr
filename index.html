<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>양재역 3D · Gray-zone C-UAS</title>
  </head>
  <body>
    <div id="cesiumContainer"></div>
    <div id="hud">
      <div class="hud-title" id="hud-title">AEGIS · COP</div>
      <select id="loc-select" title="기준 위치"></select>
      <div class="hud-line" id="hud-coord">—</div>
      <div class="hud-line" id="hud-scale">—</div>
    </div>
    <div id="scalebar">
      <div id="scalebar-track"><div id="scalebar-inner"></div></div>
      <div id="scalebar-label">—</div>
    </div>
    <div id="layers">
      <div class="panel-title">LAYERS</div>
      <label><input type="checkbox" id="lyr-zones" checked /> 우선구역</label>
      <label
        ><input type="checkbox" id="lyr-sites" checked /> 설치후보지
        <span id="cnt-sites" class="cnt">—</span></label
      >
      <label><input type="checkbox" id="lyr-ao" checked /> 분석영역(AO)</label>
      <label
        ><input type="checkbox" id="lyr-drones" checked /> 위협체(드론)
        <span id="cnt-drones" class="cnt">—</span></label
      >
      <div class="legend">
        <span class="lg lg-p"></span>보호<span class="lg lg-a"></span>접근<span
          class="lg lg-s"
        ></span
        >민감<span class="lg lg-site"></span>후보지
      </div>
    </div>
    <div id="sim">
      <div class="panel-title">
        THREAT SIM <span id="sim-status" class="sim-status">● RUN</span>
      </div>
      <div class="sim-controls">
        <button id="sim-toggle" class="btn">⏸ 일시정지</button>
        <button id="sim-burst" class="btn btn-alert">섞어쏘기 +5</button>
        <label class="chk"
          ><input type="checkbox" id="sim-trails" checked /> 궤적</label
        >
      </div>
      <div class="track-table-wrap">
        <table id="track-table">
          <thead>
            <tr>
              <th>ID</th>
              <th>TYPE</th>
              <th>SPD</th>
              <th>ALT</th>
              <th>HDG</th>
              <th>ST</th>
              <th>THREAT</th>
            </tr>
          </thead>
          <tbody id="track-rows"></tbody>
        </table>
      </div>
    </div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
