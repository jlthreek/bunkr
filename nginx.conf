# bunkr 정적 SPA 서빙. 컨테이너 내부 80 → nginx-ui 리버스 프록시가 443 종단.
server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # Cesium WASM 자산 MIME 보정
    location ~* \.wasm$ {
        default_type application/wasm;
    }

    # 정적 자산 캐시(해시 파일명)
    location /assets/ {
        expires 7d;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    location / {
        try_files $uri $uri/ /index.html;
    }
}
